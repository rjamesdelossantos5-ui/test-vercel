<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Feed - Capstone Test</title>
    
    <!-- This is the "magic" link that makes all those Tailwind classes work -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Optional: A modern Google Font to make it look premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 via-purple-50 to-teal-50 min-h-screen font-sans antialiased text-slate-800 p-4 sm:p-8">

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <header class="mb-10 text-center mt-8">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 tracking-tight drop-shadow-sm">
                Nexus Feed
            </h1>
            <p class="text-slate-500 mt-2 font-medium">Share your thoughts with the world</p>
        </header>

        <!-- Create/Edit Post Card (Glassmorphism design) -->
        <div class="bg-white/70 backdrop-blur-lg border border-white/50 shadow-xl rounded-3xl p-6 mb-8">
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Your Display Name" 
                    class="w-full px-4 py-3 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none font-medium text-slate-700 placeholder-slate-400">
                
                <textarea id="postContent" rows="3" placeholder="What's on your mind?" 
                    class="w-full px-4 py-3 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none resize-none text-slate-700 placeholder-slate-400"></textarea>
                
                <div class="flex justify-end">
                    <!-- Hidden input to track if we are editing an existing post -->
                    <input type="hidden" id="editPostId" value="">
                    
                    <button id="cancelEditBtn" class="hidden px-6 py-2.5 mr-3 text-slate-600 font-semibold hover:bg-white/80 rounded-xl transition-all shadow-sm border border-slate-200">
                        Cancel
                    </button>
                    <button id="postBtn" class="px-8 py-2.5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-xl shadow-md hover:shadow-xl hover:scale-[1.02] transition-all duration-200">
                        Publish
                    </button>
                </div>
            </div>
        </div>

        <!-- The Feed Container -->
        <div id="feedContainer" class="space-y-6 pb-12">
            <!-- Posts will be injected here by app.js -->
        </div>
    </div>

    <!-- 1. Load the official Supabase library from their CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 2. Load your custom logic file -->
    <script src="app.js"></script>
</body>

            <div class="w-10 h-10 bg-gray-300 rounded-full cursor-pointer"></div> <!-- Fake Profile Pic -->

    </nav>

    <!-- MAIN LAYOUT (3 Columns) -->
    <main class="flex-1 flex overflow-hidden max-w-7xl mx-auto w-full">
        
        <!-- LEFT SIDEBAR -->
        <aside class="w-1/4 p-4 hidden lg:block overflow-y-auto">
            <ul class="space-y-4 text-gray-700 font-medium">
                <li class="flex items-center space-x-3 cursor-pointer hover:bg-gray-200 p-2 rounded-md">
                    <span class="text-xl">👤</span> <span>Your Profile</span>
                </li>
                <li class="flex items-center space-x-3 cursor-pointer hover:bg-gray-200 p-2 rounded-md">
                    <span class="text-xl">👥</span> <span>Friends</span>
                </li>
                <li class="flex items-center space-x-3 cursor-pointer hover:bg-gray-200 p-2 rounded-md">
                    <span class="text-xl">⏱️</span> <span>Memories</span>
                </li>
                <li class="flex items-center space-x-3 cursor-pointer hover:bg-gray-200 p-2 rounded-md">
                    <span class="text-xl">🔖</span> <span>Saved</span>
                </li>
            </ul>
        </aside>

        <!-- CENTER FEED (The core functionality) -->
        <section class="flex-1 p-4 overflow-y-auto h-full scrollbar-hide flex flex-col items-center">
            <div class="w-full max-w-xl">
                
                <!-- CREATE POST BOX -->
                <div class="bg-white p-4 rounded-xl shadow-sm mb-6">
                    <div class="flex space-x-3 mb-4">
                        <div class="w-10 h-10 bg-gray-300 rounded-full flex-shrink-0"></div>
                        <input type="text" id="username" placeholder="Your Display Name" class="w-1/3 bg-gray-100 rounded-full px-4 py-2 focus:outline-none text-sm">
                        <input type="text" id="postContent" placeholder="What's on your mind?" class="w-full bg-gray-100 rounded-full px-4 py-2 focus:outline-none text-sm">
                    </div>
                    <hr class="mb-3">
                    <div class="flex justify-between items-center">
                        <div class="flex space-x-4 text-gray-500 text-sm font-semibold">
                            <button class="hover:bg-gray-100 px-2 py-1 rounded flex items-center space-x-2"><span>📷</span> <span>Photo/Video</span></button>
                        </div>
                        <button id="postBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-1 px-6 rounded-md transition duration-200">Post</button>
                    </div>
                </div>

                <!-- POSTS CONTAINER (Data loads here) -->
                <div id="feedContainer" class="space-y-4">
                    <!-- Loading skeleton -->
                    <div class="text-center text-gray-500 py-4">Loading feed...</div>
                </div>

            </div>
        </section>

        <!-- RIGHT SIDEBAR -->
        <aside class="w-1/4 p-4 hidden lg:block overflow-y-auto">
            <h3 class="text-gray-500 font-bold mb-4">Sponsored</h3>
            <div class="bg-white p-3 rounded-lg shadow-sm mb-6 cursor-pointer">
                <div class="h-32 bg-gray-200 rounded-md mb-2"></div>
                <p class="font-semibold text-sm">Learn Data Analysis</p>
                <p class="text-xs text-gray-500">boost-your-skills.com</p>
            </div>
            
            <hr class="my-4 border-gray-300">
            
            <h3 class="text-gray-500 font-bold mb-4">Contacts</h3>
            <ul class="space-y-3">
                <li class="flex items-center space-x-3 cursor-pointer">
                    <div class="w-8 h-8 bg-gray-300 rounded-full relative">
                        <div class="w-3 h-3 bg-green-500 rounded-full border-2 border-white absolute bottom-0 right-0"></div>
                    </div>
                    <span class="font-medium text-sm">Active User 1</span>
                </li>
            </ul>
        </aside>

    </main>

    <!-- Your Logic -->
    <script src="app.js"></script>
</body>
